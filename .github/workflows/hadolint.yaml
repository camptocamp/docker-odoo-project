name: hadolint

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:

  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.3.0
        with:
          recursive: true
